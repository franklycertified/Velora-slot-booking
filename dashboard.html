<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELORA Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:#0a0014;
color:white;
padding:20px;
}

.header{
font-size:28px;
font-weight:800;
color:#8a2be2;
}

.card{
background:#120022;
padding:18px;
border-radius:16px;
margin-top:15px;
border:1px solid rgba(138,43,226,.25);
}

.balance{
font-size:34px;
font-weight:800;
margin:10px 0;
}

.badge{
display:inline-block;
padding:5px 12px;
background:#8a2be2;
border-radius:20px;
font-size:12px;
margin-bottom:10px;
}

.btn{
padding:10px 12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#8a2be2;
color:white;
font-weight:700;
margin:5px;
}

.btn2{
background:#1a0a2e;
border:1px solid #8a2be2;
}

.module{
background:#1a0a2e;
padding:10px;
border-radius:10px;
margin-top:8px;
font-size:13px;
}

.popup{
position:fixed;
bottom:20px;
left:20px;
background:#1a0a2e;
padding:12px;
border-radius:12px;
border:1px solid #8a2be2;
display:none;
width:280px;
}
.small{color:#aaa;font-size:12px}
</style>
</head>

<body>

<div class="header">💜 VELORA DASHBOARD</div>

<div class="card">
<div id="user">Hi Member 👋</div>
<div class="badge" id="plan">PLAN</div>

<div>Total Balance (Instant Cashback)</div>
<div class="balance" id="balance">₦0</div>

<button class="btn btn2" onclick="toggleCurrency()">Switch Currency</button>
</div>

<div class="card">
<h3>⚡ Activation</h3>
<p id="activation"></p>
</div>

<div class="card">
<h3>💰 EARNING STRUCTURE</h3>
<div id="modules"></div>
</div>

<div class="card">
<h3>🔗 Referral Link</h3>
<div id="ref"></div>
</div>

<div class="popup" id="popup">
<div id="msg"></div>
</div>

<script>

window.onload = function(){

/* USER */
const user = localStorage.getItem("velora_username") || "Member";
const plan = localStorage.getItem("velora_plan") || "PLATINUM";

document.getElementById("user").innerText = "Hi " + user + " 👋";
document.getElementById("plan").innerText = plan;

/* PLAN STRUCTURE (YOUR REAL SYSTEM) */
let balance = (plan === "GOLD") ? 12000 : 8000;

/* CURRENCY */
let naira = balance;
let usdRate = 1600;
let showUSD = false;

const bal = document.getElementById("balance");
bal.innerText = "₦" + naira.toLocaleString();

window.toggleCurrency = function(){
if(!showUSD){
bal.innerText = "$" + (naira/usdRate).toFixed(2);
showUSD = true;
}else{
bal.innerText = "₦" + naira.toLocaleString();
showUSD = false;
}
}

/* ACTIVATION (REAL FROM YOUR PLAN) */
document.getElementById("activation").innerText =
plan === "GOLD"
? "🔥 Gold Activation Fee: ₦14,500 ($7.25)"
: "💜 Platinum Activation Fee: ₦9,000 ($4.50)";

/* MODULES (FROM YOUR SPEC) */
const modules = (plan === "GOLD") ? [

"💰 Instant Cashback → ₦12,000 ($6.00)",
"🤝 Direct Referral → ₦12,500 ($6.25)",
"🌟 Spillover Bonus → ₦400 / ₦100 levels",
"🤖 AI Rewards → ₦10,000 ($5.00)",
"⚽ Football Quiz → ₦8,000 ($4.00)",
"▶️ YouTube Earnings → ₦40,000 ($20.00)",
"👻 Snapchat Tasks → ₦6,000 ($3.00)",
"🎁 Active User Bonus → ₦8,000 ($4.00)"
] : [

"💰 Instant Cashback → ₦8,000 ($4.00)",
"🤝 Direct Referral → ₦7,200 ($3.60)",
"🌟 Indirect Bonus → ₦300 / ₦100 levels",
"🤖 AI Rewards → ₦5,000 ($2.50)",
"⚽ Football Quiz → ₦4,000 ($2.00)",
"▶️ YouTube Earnings → ₦20,000 ($10.00)",
"👻 Snapchat Tasks → ₦1,000 ($0.50)",
"🎁 Active User Bonus → ₦1,000 ($0.50)"
];

document.getElementById("modules").innerHTML =
modules.map(m => "<div class='module'>"+m+"</div>").join("");

/* REF */
document.getElementById("ref").innerText =
"velora.app/?ref=" + user;

/* 70+ GLOBAL POPUPS */
const countries = ["Nigeria","USA","UK","Kenya","Ghana","India","Canada","Brazil","UAE"];
const tasks = ["AI Task","YouTube","Quiz","Referral","Snapchat","Spillover","Engagement"];

function popup(){
const currency = Math.random() > 0.5 ? "₦" : "$";
const amount = Math.floor(Math.random()*7000)+500;
const country = countries[Math.floor(Math.random()*countries.length)];
const task = tasks[Math.floor(Math.random()*tasks.length)];

document.getElementById("msg").innerText =
"👤 " + country + " user earned " + currency + amount + " from " + task;

document.getElementById("popup").style.display = "block";

setTimeout(()=>{
document.getElementById("popup").style.display = "none";
},4000);
}

setInterval(popup,6000);
popup();

};
</script>

</body>
</html>
