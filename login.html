<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELORA LOGIN</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0a0014;
color:white;
padding:20px;
}

.container{
max-width:450px;
margin:auto;
background:#160027;
padding:35px;
border-radius:18px;
border:1px solid rgba(138,43,226,.3);
box-shadow:0 0 25px rgba(138,43,226,.15);
}

.logo{
text-align:center;
font-size:30px;
font-weight:800;
color:#8a2be2;
margin-bottom:10px;
}

h2{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#ccc;
margin-bottom:20px;
font-size:14px;
line-height:1.6;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#1d1d1d;
color:white;
outline:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:40px;
background:#8a2be2;
color:white;
font-weight:700;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

.note{
margin-top:15px;
text-align:center;
font-size:13px;
color:#aaa;
}

.plan-badge{
margin-top:15px;
padding:10px;
border-radius:10px;
background:#120022;
border:1px solid rgba(138,43,226,.3);
text-align:center;
font-size:14px;
color:#ccc;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">💜 VELORA</div>

<h2>Welcome Back</h2>

<p>Login to continue your earning journey on VELORA AI ecosystem.</p>

<input type="text" id="username" placeholder="Username or Full Name">
<input type="password" id="password" placeholder="Password">

<div class="plan-badge" id="planInfo">
Your plan will appear here after login
</div>

<button onclick="loginUser()">LOGIN</button>

<div class="note">
Don’t have an account? Register first to activate your plan.
</div>

</div>

<script>
function loginUser(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

// simple demo check (you can improve later)
const savedUser = localStorage.getItem("glamourUser");
const savedPlan = localStorage.getItem("veloraPlan");

if(!username || !password){
alert("Please fill all fields");
return;
}

if(username !== savedUser){
alert("User not found. Please register first.");
return;
}

// show plan
document.getElementById("planInfo").innerText =
"Active Plan: " + (savedPlan || "No plan found");

// redirect to dashboard
setTimeout(()=>{
window.location.href = "dashboard.html";
},1500);

}
</script>

</body>
</html>
