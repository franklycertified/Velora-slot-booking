<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELORA Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:radial-gradient(circle at top,#1a0033,#0a0014 60%,#000);
color:white;
padding:20px;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:100%;
max-width:420px;
background:rgba(18,0,34,0.9);
padding:28px;
border-radius:18px;
border:1px solid rgba(138,43,226,.25);
box-shadow:0 0 25px rgba(138,43,226,.15);
backdrop-filter:blur(8px);
text-align:center;
}

.logo{
font-size:30px;
font-weight:800;
color:#a855f7;
margin-bottom:8px;
}

h2{
font-size:20px;
margin-bottom:8px;
}

.subtitle{
font-size:13px;
color:#cfcfcf;
line-height:1.6;
margin-bottom:18px;
}

input{
width:100%;
padding:14px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#1a0a2e;
color:white;
outline:none;
transition:0.2s;
}

input:focus{
border:1px solid #8a2be2;
box-shadow:0 0 8px rgba(138,43,226,.3);
}

button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#8a2be2,#a855f7);
color:white;
font-weight:700;
cursor:pointer;
margin-top:10px;
transition:0.2s;
}

button:hover{
transform:scale(1.02);
opacity:0.95;
}

/* bottom note */
.footer-note{
margin-top:18px;
padding-top:14px;
border-top:1px solid rgba(255,255,255,0.08);
font-size:12px;
color:#aaa;
line-height:1.6;
}

.footer-note span{
color:#a855f7;
font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">💜 VELORA</div>

<h2>Welcome Back</h2>

<div class="subtitle">
Login to continue your earning journey on VELORA AI ecosystem.
</div>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="loginUser()">LOGIN</button>

<div class="footer-note">
<span>Your plan will appear here after login</span><br>
Don’t have an account? Register first to activate your plan.
</div>

</div>

<script>

function loginUser(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

const savedUser = localStorage.getItem("velora_username");
const savedPass = localStorage.getItem("velora_password");

if(!username || !password){
alert("Please fill all fields");
return;
}

if(username !== savedUser || password !== savedPass){
alert("Invalid login details");
return;
}

window.location.href = "dashboard.html";
}

</script>

</body>
</html>
